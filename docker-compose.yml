services:
  voscript:
    build:
      context: ./app
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: voscript
    restart: unless-stopped
    # Runs as the non-root `app` user baked into the image. Override only if
    # your DATA_DIR on the host is owned by a different uid/gid.
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    ports:
      - "${HOST_PORT:-8780}:8780"
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ${MODEL_CACHE_DIR:-./models}:/cache
      # Mount the same dir read-only at /models too so that pipeline.py's
      # "local model first, then HF fallback" path finds precompiled
      # faster-whisper checkpoints laid out as /models/faster-whisper-<size>
      # without round-tripping through HuggingFace on every cold start.
      - ${MODEL_CACHE_DIR:-./models}:/models:ro
    environment:
      # HuggingFace token — required for gated models (pyannote diarization,
      # segmentation-3.0, wespeaker-voxceleb-resnet34-LM).  Accept each model's
      # gating agreement at https://huggingface.co before the first run.
      - HF_TOKEN=${HF_TOKEN}
      # Bearer token for /api/* endpoints.  Leave empty to disable auth (LAN only).
      - API_KEY=${API_KEY:-}
      # Maximum upload size in bytes.  Default: 2 GiB (~20 h of audio).
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-2147483648}
      # GPU index exposed to the container.  Set to "" to force CPU-only mode.
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      # Whisper model size.  Pre-download to MODEL_CACHE_DIR/faster-whisper-<size>
      # to avoid downloading from HuggingFace on every cold start.
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      # Compute device: "cuda" (default) or "cpu".
      - DEVICE=${DEVICE:-cuda}
      # Noise reduction backend: none | deepfilternet | noisereduce.
      # Recommended: none for PLAUD Pin / high-quality mics; deepfilternet only
      # for noisy environments (SNR < 5 dB).  See docs/configuration.md.
      - DENOISE_MODEL=${DENOISE_MODEL:-none}
      # SNR gate (dB): audio at or above this threshold skips denoising.
      # 10 dB ensures all PLAUD Pin recordings (min SNR 12.4 dB) are skipped.
      - DENOISE_SNR_THRESHOLD=${DENOISE_SNR_THRESHOLD:-10.0}
      # Base cosine-similarity threshold for voiceprint identification (0.0–1.0).
      # Adaptive relaxation applies per-speaker on top of this base value.
      - VOICEPRINT_THRESHOLD=${VOICEPRINT_THRESHOLD:-0.75}
      # HuggingFace API endpoint.  Override to use a mirror in restricted regions.
      - HF_ENDPOINT=${HF_ENDPOINT:-https://huggingface.co}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8780/healthz', timeout=2).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      # 首次启动需要加载 whisper/pyannote/wespeaker 模型（可能 2+ 分钟），start_period 给足余量。
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
