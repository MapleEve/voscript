name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check app/ --ignore E501
      - run: ruff format --check app/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lightweight test dependencies (no GPU packages)
        run: pip install pytest pytest-cov fastapi httpx numpy aiofiles starlette python-multipart
      - name: Run tests
        run: |
          pytest tests/unit/ tests/test_security.py \
            -v --tb=short --no-header

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        # transformers CVEs (PYSEC-2024-22[7-9], PYSEC-2025-40, CVE-2024-12720,
        # CVE-2025-{1194,3263,3264,3777,3933,5197,6051,6638,6921}, CVE-2026-1839)
        # cannot be fixed: transformers>=4.48 requires huggingface_hub>=0.24 which
        # breaks pyannote 3.1.1 (uses the removed use_auth_token kwarg). Tracked
        # as known technical debt; resolvable only when pyannote is upgraded.
        run: |
          pip-audit -r app/requirements.txt \
            --ignore-vuln PYSEC-2022-42969 \
            --ignore-vuln PYSEC-2024-227 \
            --ignore-vuln PYSEC-2024-228 \
            --ignore-vuln PYSEC-2024-229 \
            --ignore-vuln PYSEC-2025-40 \
            --ignore-vuln CVE-2024-12720 \
            --ignore-vuln CVE-2025-1194 \
            --ignore-vuln CVE-2025-3263 \
            --ignore-vuln CVE-2025-3264 \
            --ignore-vuln CVE-2025-3777 \
            --ignore-vuln CVE-2025-3933 \
            --ignore-vuln CVE-2025-5197 \
            --ignore-vuln CVE-2025-6051 \
            --ignore-vuln CVE-2025-6638 \
            --ignore-vuln CVE-2025-6921 \
            --ignore-vuln CVE-2026-1839
