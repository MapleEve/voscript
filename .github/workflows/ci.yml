name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check app/ --ignore E501
      - run: ruff format --check app/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 安装轻量测试依赖（不含 GPU 包）
        run: pip install pytest pytest-cov fastapi httpx numpy
      - name: 运行单元测试（排除需要 GPU/模型的测试）
        # 暂时允许失败（现有测试针对已删除的 OSD 功能）
        # TODO: 修复测试套件后移除 || true，改为强制失败
        run: |
          pytest tests/ -m "not integration and not e2e" \
            --ignore=tests/test_e2e.py \
            --ignore=tests/test_separation.py \
            -v --tb=short 2>&1 || true

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969 || true
        # || true: 不阻断构建，但在 Summary 中显示漏洞报告
