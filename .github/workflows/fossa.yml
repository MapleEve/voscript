name: FOSSA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fossa:
    name: fossa
    runs-on: ubuntu-latest
    env:
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
    steps:
      - name: Skip when FOSSA_API_KEY is not configured
        if: ${{ env.FOSSA_API_KEY == '' }}
        run: echo "FOSSA_API_KEY is not configured; skipping FOSSA scan."
      - uses: actions/checkout@v4
        if: ${{ env.FOSSA_API_KEY != '' }}
      - name: Run FOSSA scan
        if: ${{ env.FOSSA_API_KEY != '' }}
        uses: fossas/fossa-action@v1.7.0
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
      - name: Run FOSSA diff test
        if: ${{ env.FOSSA_API_KEY != '' && github.event_name == 'pull_request' }}
        uses: fossas/fossa-action@v1.7.0
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
          run-tests: true
          test-diff-revision: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
