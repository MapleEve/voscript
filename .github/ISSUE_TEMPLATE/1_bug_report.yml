name: '🐛 Bug Report'
description: 'Report a bug'
title: '[BUG] '
labels: [ '🔍 Unconfirmed' ]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a new issue, please [search existing issues](https://github.com/MapleEve/voscript/issues) — if one already matches, give it a **👍** instead of filing a duplicate.
  - type: dropdown
    attributes:
      label: '📦 Deployment'
      multiple: true
      options:
        - 'docker compose (this repo)'
        - 'Bare metal / venv'
        - 'Kubernetes / other container runtime'
        - 'Other'
    validations:
      required: true
  - type: input
    attributes:
      label: '📌 Service version / commit'
      description: 'Output of `git rev-parse --short HEAD` or the release tag.'
    validations:
      required: true
  - type: input
    attributes:
      label: '🎮 GPU / CUDA'
      description: 'e.g. RTX 3090 / CUDA 12.4. Use `nvidia-smi` if unsure.'
    validations:
      required: true
  - type: dropdown
    attributes:
      label: '🔗 Client'
      description: 'How was the service being called when the bug happened?'
      multiple: true
      options:
        - 'OpenPlaud'
        - 'Built-in web UI at /'
        - 'curl / custom script'
        - 'Other'
    validations:
      required: true
  - type: textarea
    attributes:
      label: '🐛 Bug description'
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: '📷 Reproduction steps'
      description: Minimal steps to reproduce. Include the exact `curl` or OpenPlaud action.
  - type: textarea
    attributes:
      label: '🚦 Expected behavior'
  - type: textarea
    attributes:
      label: '📝 Additional context'
  - type: textarea
    attributes:
      label: 'Container logs'
      description: |
        Paste relevant output from `docker logs voscript`.
        Sensitive values (HF_TOKEN, API_KEY) MUST be redacted before you paste.
      render: shell
